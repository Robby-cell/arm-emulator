name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+" # Triggers release job on version tags
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: arm_emulator-linux.tar.gz
            binary_name: arm_emulator
            package_script: package.sh
            venv_activate: .venv/bin/activate
          - os: macos-latest
            asset_name: arm_emulator-macos.tar.gz
            binary_name: arm_emulator
            package_script: package.sh
            venv_activate: .venv/bin/activate
          - os: windows-latest
            asset_name: arm_emulator-windows.zip
            binary_name: arm_emulator.exe
            package_script: package-windows.sh
            venv_activate: .venv/Scripts/activate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run Cargo tests
        run: cargo test --all

      - name: Create Virtual Environment
        run: uv venv

      - name: Build Rust bindings
        run: uvx maturin develop --release

      - name: Sync dependencies
        run: uv sync

      - name: Build Translations
        run: bash build-translations.sh

      - name: Package Executable
        # 'shell: bash' ensures Git Bash is used on Windows so 'source' and '.sh' scripts work
        shell: bash
        run: |
          source ${{ matrix.venv_activate }}
          bash ${{ matrix.package_script }}

      - name: Archive artifact for Linux and macOS
        if: runner.os != 'Windows'
        run: |
          cd dist
          tar -czf ../${{ matrix.asset_name }} ${{ matrix.binary_name }}

      - name: Archive artifact for Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd dist
          # 7z is pre-installed on GitHub Windows runners and handles zip reliably
          7z a ../${{ matrix.asset_name }} ${{ matrix.binary_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-artifact
          path: ${{ matrix.asset_name }}

  release:
    name: Create Release
    needs: build
    # Only run this job if a tag was pushed (e.g., git tag v1.0.0 && git push --tags)
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true # Flattens the downloads into a single directory

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
