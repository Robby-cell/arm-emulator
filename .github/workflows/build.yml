name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+" # Triggers release job on version tags
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: arm_emulator-linux.tar.gz
            binary_name: arm_emulator
            grader_asset_name: arm_grader-linux.tar.gz
            grader_binary_name: arm_auto_grader
            package_script: package.sh
            venv_activate: .venv/bin/activate
          - os: macos-latest
            asset_name: arm_emulator-macos.tar.gz
            binary_name: arm_emulator
            grader_asset_name: arm_grader-macos.tar.gz
            grader_binary_name: arm_auto_grader
            package_script: package.sh
            venv_activate: .venv/bin/activate
          - os: windows-latest
            asset_name: arm_emulator-windows.zip
            binary_name: arm_emulator.exe
            grader_asset_name: arm_grader-windows.zip
            grader_binary_name: arm_auto_grader.exe
            package_script: package-windows.sh
            venv_activate: .venv/Scripts/activate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run Cargo tests
        run: cargo test --all

      - name: Create Virtual Environment
        run: uv venv

      - name: Build Rust bindings (Required for PyInstaller to see the module)
        run: uvx maturin develop --release

      - name: Sync dependencies
        run: uv sync

      - name: Build Translations
        run: bash build-translations.sh

      - name: Package GUI Executable
        shell: bash
        run: |
          source ${{ matrix.venv_activate }}
          bash ${{ matrix.package_script }}

      # Package the Python Auto-Grader into a Binary
      - name: Package Auto-Grader Binary
        shell: bash
        run: |
          source ${{ matrix.venv_activate }}
          uv run pyinstaller --onefile \
            --name arm_auto_grader \
            --additional-hooks-dir=hooks \
            auto_grader.py

      - name: Archive artifacts for Linux and macOS
        if: runner.os != 'Windows'
        run: |
          # Archive GUI
          cd dist
          tar -czf ../${{ matrix.asset_name }} ${{ matrix.binary_name }}
          # Archive Grader
          tar -czf ../${{ matrix.grader_asset_name }} ${{ matrix.grader_binary_name }}

      - name: Archive artifacts for Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # Archive GUI
          cd dist
          7z a ../${{ matrix.asset_name }} ${{ matrix.binary_name }}
          # Archive Grader
          7z a ../${{ matrix.grader_asset_name }} ${{ matrix.grader_binary_name }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-artifacts
          path: |
            ${{ matrix.asset_name }}
            ${{ matrix.grader_asset_name }}

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
