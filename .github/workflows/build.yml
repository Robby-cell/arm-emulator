name: Build and Package

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # If one OS fails, let the others finish
      matrix: os:[ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Setup Rust
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Setup uv (Astral's official GitHub Action)
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # 4. Sync Environment
      - name: Sync dependencies
        run: uv sync

      # 5. Run Rust Tests
      - name: Run Cargo tests
        run: cargo test --all

      # 6. Build Rust Bindings via maturin
      - name: Build Rust bindings
        run: uvx maturin develop --release

      # 7a. Package (Linux and macOS)
      - name: Package Executable (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          # Activate the uv virtual environment
          source .venv/bin/activate
          # Run the packaging script
          bash package.sh

      # 7b. Package (Windows)
      - name: Package Executable (Windows)
        if: runner.os == 'Windows'
        shell: bash # Forces GitHub Actions to use Git Bash
        run: |
          # Activate the uv virtual environment (Windows path)
          source .venv/Scripts/activate
          # Run the Windows packaging script
          bash package-windows.sh

      # 8. Upload Artifacts
      - name: Upload Executable
        uses: actions/upload-artifact@v4
        with:
          name: arm_emulator-${{ runner.os }}
          path: |
            dist/arm_emulator
            dist/arm_emulator.exe
          if-no-files-found: error
